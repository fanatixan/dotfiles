# ~/.tmux.conf  —  deploy to: ~/.tmux.conf  (replaces your current 2-line file)

set -g history-limit 50000          # scrollback lines per pane
set -g mouse on                     # click/drag/scroll panes (hold Shift for native text selection)

set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"  # true color in panes (Ghostty)

# Clipboard: OSC52 sends copies back to the client (laptop); pbcopy also fills the Mac pasteboard
set -g set-clipboard on
set -g allow-passthrough on          # let vim's OSC52 sequences pass through tmux
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y     send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "pbcopy"

# Splits keep the current dir;  | = left/right,  - = top/bottom
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-style pane focus (prefix h/j/k/l) and resize (prefix Shift-h/j/k/l, repeatable)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# One-key layouts (prefix Space still cycles all five built-ins)
bind M-v select-layout main-vertical
bind M-h select-layout main-horizontal
bind M-t select-layout tiled
bind -r Space next-layout

bind r source-file ~/.tmux.conf \; display "tmux.conf reloaded"

# Cheat sheet popup (q to close); full auto-list is still `prefix` then :list-keys
bind ? display-popup -E -w 80% -h 85% \
  "glow -p ~/cheatsheets/tmux/general.md"
